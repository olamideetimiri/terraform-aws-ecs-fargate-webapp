name: Deploy to ECS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: eu-west-2
  ECR_REPOSITORY: mazwi-ecs-repo
  ECS_CLUSTER_NAME: mazwi-ecs-cluster
  ECS_SERVICE_NAME: mazwi-ecs-service
  IMAGE_TAG: latest

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build --platform linux/amd64 \
            -t $ECR_REPOSITORY:$IMAGE_TAG ./app

      - name: Run container locally for smoke test
        run: |
          docker run -d \
            --name test-app \
            -p 8000:8000 \
            $ECR_REPOSITORY:$IMAGE_TAG

      - name: Wait for container to start
        run: |
          sleep 5

      - name: Test health endpoint
        run: |
          curl --fail http://localhost:8000/health

      - name: Stop test container
        if: always()
        run: |
          docker stop test-app || true
          docker rm test-app || true

      - name: Tag Docker image
        run: |
          docker tag $ECR_REPOSITORY:$IMAGE_TAG \
            ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Push Docker image to ECR
        run: |
          docker push \
            ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Force new ECS deployment
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER_NAME \
            --service $ECS_SERVICE_NAME \
            --force-new-deployment \
            --region $AWS_REGION
